<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Detector - Age, Emotion, & Ghost Finder</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            background: #121212; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace;
        }
        .container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
            border: 2px solid #333;
            line-height: 0;
        }
        canvas { 
            position: absolute; 
            top: 0;
            left: 0;
        }
        .info { 
            margin-top: 15px; 
            background: #222; 
            padding: 10px 20px; 
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <h2>SYSTEM SCANNING: MULTI-FACE & ATTRIBUTE</h2>
    
    <div class="container" id="wrapper">
        <video id="video" width="720" height="560" autoplay muted playsinline></video>
        </div>

    <div class="info" id="status">Mengunduh Otak AI (Tunggu sebentar)...</div>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');

        // 1. Memuat Model AI (Menggunakan repositori yang lebih stabil)
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';

        async function init() {
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
                    faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
                ]);
                statusText.innerText = "Model Dimuat! Menghubungkan Kamera...";
                startVideo();
            } catch (e) {
                statusText.innerText = "Gagal Memuat Model. Pastikan Internet Aktif.";
                console.error(e);
            }
        }

        // 2. Menyalakan Kamera
        function startVideo() {
            navigator.mediaDevices.getUserMedia({ 
                video: { width: 720, height: 560 } 
            })
            .then(stream => {
                video.srcObject = stream;
                statusText.innerText = "Sistem Aktif - Mencari Wajah...";
            })
            .catch(err => {
                statusText.innerText = "Kamera Diblokir! Izinkan akses kamera.";
                console.error(err);
            });
        }

        // 3. Proses Deteksi
        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('wrapper').append(canvas);
            
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(
                    video, 
                    new faceapi.TinyFaceDetectorOptions()
                )
                .withFaceLandmarks()
                .withFaceExpressions()
                .withAgeAndGender();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                // Clear canvas
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                
                // Gambar Kotak & Titik Wajah
                faceapi.draw.drawDetections(canvas, resizedDetections);
                faceapi.draw.drawFaceExpressions(canvas, resizedDetections);

                // Gambar Teks Umur & Gender
                resizedDetections.forEach(result => {
                    const { age, gender } = result;
                    const box = result.detection.box;
                    
                    new faceapi.draw.DrawTextField(
                        [
                            `${Math.round(age)} Tahun`,
                            `${gender === 'male' ? 'Pria' : 'Wanita'}`
                        ],
                        box.bottomLeft
                    ).draw(canvas);
                });
            }, 100);
        });

        init();
    </script>
</body>
</html>
