<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>AI Face Detector - Age, Emotion, & Multi-Face</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; background: #1a1a1a; color: white; flex-direction: column; }
        canvas { position: absolute; }
        video { border-radius: 10px; }
        .info { margin-top: 10px; font-family: sans-serif; }
    </style>
</head>
<body>

    <h2>AI Multi-Face Detector</h2>
    <div style="position: relative;">
        <video id="video" width="720" height="560" autoplay muted></video>
    </div>
    <div class="info" id="status">Memuat Model AI...</div>

    <script>
        const video = document.getElementById('video');

        // 1. Load Model dari GitHub/CDN
        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'),
            faceapi.nets.faceLandmark68Net.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'),
            faceapi.nets.faceRecognitionNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'),
            faceapi.nets.faceExpressionNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'),
            faceapi.nets.ageGenderNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights')
        ]).then(startVideo);

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    document.getElementById('status').innerText = "AI Siap!";
                })
                .catch(err => console.error(err));
        }

        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.body.append(canvas);
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                // Deteksi semua wajah dengan tambahan umur & ekspresi
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceExpressions()
                    .withAgeAndGender();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                // Bersihkan canvas dan gambar ulang
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, resizedDetections);
                faceapi.draw.drawFaceExpressions(canvas, resizedDetections);

                // Tampilkan Umur & Gender secara kustom
                resizedDetections.forEach(detection => {
                    const { age, gender } = detection;
                    new faceapi.draw.DrawTextField(
                        [
                            `${faceapi.utils.round(age, 0)} Tahun`,
                            `${gender === 'male' ? 'Laki-laki' : 'Perempuan'}`
                        ],
                        detection.detection.box.bottomRight
                    ).draw(canvas);
                });
            }, 100); // Update setiap 100ms
        });
    </script>
</body>
</html>
